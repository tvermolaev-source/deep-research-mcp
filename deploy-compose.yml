# Production compose — один контейнер deep-research-mcp.
# SearXNG/Open WebUI уже подняты где-то ещё — здесь только MCP-сервер.
#
# Использование:
#   docker compose -f deploy-compose.yml pull
#   docker compose -f deploy-compose.yml up -d

services:
  deep-research-mcp:
    image: ${IMAGE:-ghcr.io/tvermolaev-source/deep-research-mcp}:${VERSION:-latest}
    container_name: deep-research-mcp
    environment:
      # URL существующего SearXNG
      SEARXNG_URL: "${SEARXNG_URL:-http://host.docker.internal:8888}"
      SEARXNG_LANGUAGE: "${SEARXNG_LANGUAGE:-ru}"
      SEARXNG_ENGINES: "${SEARXNG_ENGINES:-google,bing,duckduckgo}"
      SEARXNG_SAFESEARCH: "${SEARXNG_SAFESEARCH:-0}"

      LLM_BASE_URL: "${LLM_BASE_URL:-http://host.docker.internal:11434/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-ollama}"
      LLM_MODEL: "${LLM_MODEL:-qwen2.5:7b}"

      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      MAX_ITERATIONS_BALANCED: "${MAX_ITERATIONS_BALANCED:-6}"
      MAX_PARALLEL_CRAWLS: "${MAX_PARALLEL_CRAWLS:-5}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

      # ── Фильтрация выдачи SearXNG (эффективные дефолты) ────────────────
      MIN_RESULT_SCORE: "${MIN_RESULT_SCORE:-0.5}"
      RESULTS_TOP_K_PER_QUERY: "${RESULTS_TOP_K_PER_QUERY:-5}"
      DOMAIN_BOOST_THRESHOLD: "${DOMAIN_BOOST_THRESHOLD:-2}"
      BLOCKED_DOMAINS: "${BLOCKED_DOMAINS:-facebook.com,fb.com,instagram.com,tiktok.com,pinterest.com,vk.com,ok.ru,linkedin.com,twitter.com,x.com,reddit.com}"
      PRIORITY_DOMAINS: "${PRIORITY_DOMAINS:-ria.ru,tass.ru,rbc.ru,vedomosti.ru,kommersant.ru,interfax.ru,hightech.fm,naukaip.ru,hse.ru,sk.ru,ras.ru}"
    ports:
      - "${MCP_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/mcp', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
