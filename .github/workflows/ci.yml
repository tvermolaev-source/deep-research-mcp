name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Syntax check
        run: python scripts/check_syntax.py

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t deep-research-mcp:${{ github.sha }} .
      - name: Smoke test (help / import)
        run: |
          docker run --rm deep-research-mcp:${{ github.sha }} python -c "import deep_research; print('OK', deep_research.__version__)"
