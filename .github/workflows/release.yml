name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Позволяет перезапустить сборку вручную с вкладки Actions —
  # полезно, если авто-сборка по тегу упала (например, из-за таймаута
  # или прав на push в GHCR).
  workflow_dispatch:
    inputs:
      version:
        description: "Версия для тегирования (например 0.1.5). Если пусто — используется текущий тег или latest."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (optional)
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          # При пуше тега — берём версию из тега.
          # При ручном запуске (workflow_dispatch) — из inputs.version,
          # иначе — latest.
          if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Build & push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deep-research-mcp:latest
            ghcr.io/${{ github.repository_owner }}/deep-research-mcp:${{ steps.meta.outputs.VERSION }}
          labels: |
            org.opencontainers.image.title=deep-research-mcp
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.VERSION }}

      - name: Build & push to Docker Hub (if secrets configured)
        if: env.DOCKERHUB_OK == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/deep-research-mcp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/deep-research-mcp:${{ steps.meta.outputs.VERSION }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
